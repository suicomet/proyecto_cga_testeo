<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Clientes</h2>
  <button class="btn btn-primary" (click)="mostrarForm = !mostrarForm">
    {{ mostrarForm ? 'Cancelar' : 'Nuevo Cliente' }}
  </button>
</div>

<div *ngIf="mostrarForm" class="card mb-4">
  <div class="card-header">Nuevo Cliente</div>
  <div class="card-body">
    <form (ngSubmit)="crearCliente()">
      <div class="row">
        <div class="col-md-3">
          <label>RUT</label>
          <input type="text" class="form-control" [(ngModel)]="nuevoCliente.rut" name="rut" required>
        </div>
        <div class="col-md-1">
          <label>DV</label>
          <input type="text" class="form-control" [(ngModel)]="nuevoCliente.digito_verificador" name="dv" maxlength="1" required>
        </div>
        <div class="col-md-4">
          <label>Nombre</label>
          <input type="text" class="form-control" [(ngModel)]="nuevoCliente.nombre_cliente" name="nombre" required>
        </div>
        <div class="col-md-4">
          <label>Ciudad</label>
          <input type="text" class="form-control" [(ngModel)]="nuevoCliente.ciudad" name="ciudad">
        </div>
      </div>
      <div class="row mt-2">
        <div class="col-md-6">
          <label>Dirección</label>
          <input type="text" class="form-control" [(ngModel)]="nuevoCliente.direccion" name="direccion">
        </div>
        <div class="col-md-3">
          <label>Teléfono</label>
          <input type="text" class="form-control" [(ngModel)]="nuevoCliente.telefono" name="telefono">
        </div>
        <div class="col-md-3">
          <label>Descuento %</label>
          <input type="number" class="form-control" [(ngModel)]="nuevoCliente.descuento_aplicado" name="descuento" min="0" max="100">
        </div>
      </div>
      <button type="submit" class="btn btn-success mt-3">Guardar</button>
    </form>
  </div>
</div>

<div *ngIf="clienteEdit" class="card mb-4">
  <div class="card-header">Editar Cliente</div>
  <div class="card-body">
    <form (ngSubmit)="actualizarCliente()">
      <div class="row">
        <div class="col-md-4">
          <label>Nombre</label>
          <input type="text" class="form-control" [(ngModel)]="clienteEdit.nombre_cliente" name="editNombre" required>
        </div>
        <div class="col-md-4">
          <label>Ciudad</label>
          <input type="text" class="form-control" [(ngModel)]="clienteEdit.ciudad" name="editCiudad">
        </div>
        <div class="col-md-4">
          <label>Descuento %</label>
          <input type="number" class="form-control" [(ngModel)]="clienteEdit.descuento_aplicado" name="editDescuento" min="0" max="100">
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Actualizar</button>
        <button type="button" class="btn btn-secondary ms-2" (click)="clienteEdit = null">Cancelar</button>
      </div>
    </form>
  </div>
</div>

<div class="table-responsive">
  <table class="table table-striped">
    <thead>
      <tr>
        <th>RUT</th>
        <th>Nombre</th>
        <th>Ciudad</th>
        <th>Teléfono</th>
        <th>Descuento %</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cliente of clientes">
        <td>{{ cliente.rut }}-{{ cliente.digito_verificador }}</td>
        <td>{{ cliente.nombre_cliente }}</td>
        <td>{{ cliente.ciudad }}</td>
        <td>{{ cliente.telefono }}</td>
        <td>{{ cliente.descuento_aplicado || '0' }}%</td>
        <td>
          <button class="btn btn-sm btn-warning me-1" (click)="editarCliente(cliente)">Editar</button>
          <button class="btn btn-sm btn-danger" (click)="eliminarCliente(cliente.id_cliente)">Eliminar</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
